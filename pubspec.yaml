name: licham
description: Vietnamese lunar calendar web app
version: 1.0.0
homepage: https://amlich.demen.org

environment:
  sdk: ^3.0.0
  flutter: '>=3.10.0'

dependencies:
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  intl: ^0.20.2

dev_dependencies:
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.0
  very_good_analysis: ^10.2.0

flutter:
  fonts:
    - family: MyFlutterApp
      fonts:
        - asset: fonts/MyFlutterApp.ttf
  uses-material-design: true
