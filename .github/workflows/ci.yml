name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/master'
        run: |
          COVERAGE=$(python3 -c "
          import re
          with open('coverage/lcov.info') as f:
              content = f.read()
          total = hit = 0
          for block in content.split('end_of_record'):
              lf = re.search(r'LF:(\d+)', block)
              lh = re.search(r'LH:(\d+)', block)
              if lf and lh:
                  total += int(lf.group(1))
                  hit += int(lh.group(1))
          print(f'{hit/total*100:.0f}' if total else '0')
          ")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Create coverage badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          valColorRange: ${{ env.COVERAGE }}
          minColorRange: 50
          maxColorRange: 90

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Add CNAME
        if: github.ref == 'refs/heads/master'
        run: echo "amlich.demen.org" > build/web/CNAME

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
